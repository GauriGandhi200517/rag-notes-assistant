services:
  - type: web
    name: rag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install fastapi uvicorn pymupdf python-multipart faiss-cpu numpy requests
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /tmp/models